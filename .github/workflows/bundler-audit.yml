# This workflow checks the Ruby gems in Gemfile.lock against the
# ruby-advisory-db for known CVEs, using bundler-audit.
# Brakeman was removed: it only scans Rails applications, and this
# repository is a static Jekyll site with no Rails app code.

name: Bundler Audit

on:
  push:
    branches: [ "master" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "master" ]
  schedule:
    - cron: '29 16 * * 1'

permissions:
  contents: read

jobs:
  bundler-audit:
    name: Bundler Audit
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Ruby
      uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
      with:
        ruby-version: '3.3.11'
        bundler-cache: true

    - name: Install bundler-audit
      run: gem install bundler-audit

    - name: Scan for known CVEs in gem dependencies
      run: bundle-audit check --update
